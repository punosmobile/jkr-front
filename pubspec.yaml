name: jkrfront
description: "A modern Flutter application with clean architecture"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
    
  # State management
  flutter_bloc: ^9.1.1
  bloc_concurrency: ^0.3.0
  equatable: ^2.0.7
  
  # Dependency injection
  get_it: ^9.2.1
  injectable: ^2.5.0
  
  
  # Code generation
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  
  # Networking
  dio: ^5.9.0
  retrofit: ^4.6.0
  connectivity_plus: ^7.0.0
  
  # Storage
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.5.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.3.2
  
  # Routing
  go_router: ^17.1.0
  
  # Utilities
  intl: ^0.20.2
  logger: ^2.6.2
  uuid: ^4.5.2
  path: ^1.9.1
  collection: ^1.19.1
  url_launcher: ^6.3.2
  package_info_plus: ^9.0.1
  device_info_plus: ^12.4.0
  rxdart: ^0.28.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Linting
  flutter_lints: ^6.0.0
  
  # Testing
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  
  # Code generation
  build_runner: ^2.4.13
  freezed: ^3.2.5
  json_serializable: ^6.9.5
  injectable_generator: ^2.7.0
  retrofit_generator: ^10.2.3

flutter:
  uses-material-design: true
  generate: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/

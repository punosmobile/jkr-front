services:
  frontend:
    image: jkr-front
    env_file:
      - .env.local
    ports:
      - "8080:8080"
    volumes:
      - ./build/web:/usr/share/nginx/html
      - ./nginx/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - jkr-backend

networks:
  jkr-backend:
    name: jkr-core-development_default
    external: true
